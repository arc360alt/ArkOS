---
name: Build and Release ISO
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"

jobs:
  build-iso:
    name: Build ISO and release
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ISO
        id: build
        run: |
          sudo podman run \
            --rm \
            --privileged \
            --pull=newer \
            --net=host \
            --security-opt label=type:unconfined_t \
            -v ${{ github.workspace }}/disk_config/ISO.toml:/config.toml:ro \
            -v ${{ github.workspace }}/output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --use-librepo=True \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

          sudo chown -R $USER:$USER ${{ github.workspace }}/output

      - name: Rename ISO
        run: |
          mkdir -p release
          mv output/bootiso/install.iso release/arkos-${{ github.event.inputs.version }}.iso

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "ArkOS ${{ github.event.inputs.version }}"
          body: |
            ## ArkOS ${{ github.event.inputs.version }}

            ### Installation
            1. Download the ISO below
            2. Flash it to a USB drive using Ventoy, Rufus, or `dd`
            3. Boot from the USB and follow the installer

            ### Checksum
            Run `sha256sum arkos-${{ github.event.inputs.version }}.iso` to verify your download.
          files: |
            release/arkos-${{ github.event.inputs.version }}.iso
          draft: false
          prerelease: false